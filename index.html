<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AutoCAD 指令大師：鍵盤防禦戰 v4.0</title>
<style>
    * { box-sizing: border-box; }
    
    /* 關鍵修正：將 body 設為 fixed，徹底防止 iOS 鍵盤把網頁往上推動產生的滾動 */
    html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        background-color: #1e1e1e; color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        position: fixed; 
        top: 0; left: 0;
        touch-action: none;
    }

    #app-wrapper {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
    }

    /* 遊戲掉落區 */
    #game-area {
        flex-grow: 1;
        position: relative;
        background-color: #252526;
        overflow: hidden;
        width: 100%;
        border-bottom: 2px solid #007acc;
    }

    .enemy {
        position: absolute;
        background-color: #d16969;
        color: white;
        padding: 8px 14px;
        border-radius: 5px;
        font-weight: bold;
        text-align: center;
        white-space: nowrap;
        box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        border: 1px solid #ff8888;
        font-size: 1.1rem;
    }

    /* 將控制台與資訊列整合在底部 */
    #bottom-console {
        flex-shrink: 0;
        background-color: #1e1e1e;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 10px 15px;
        /* 適應 iPhone 底部安全距離 */
        padding-bottom: env(safe-area-inset-bottom, 15px);
        z-index: 20;
    }

    #ui-bar {
        width: 100%;
        max-width: 600px;
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        font-weight: bold;
        font-size: 1.1rem;
        color: #e0e0e0;
    }

    .stat-box {
        background-color: #333;
        padding: 5px 15px;
        border-radius: 20px;
        border: 1px solid #555;
    }

    #command-input {
        width: 100%;
        max-width: 600px;
        padding: 12px;
        font-size: 16px; /* 必須為 16px，防止 iOS 點擊時自動放大 */
        text-align: center;
        text-transform: uppercase;
        border: 2px solid #007acc;
        border-radius: 8px;
        background-color: #333;
        color: #4fc1ff;
        outline: none;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        -webkit-appearance: none;
        letter-spacing: 2px;
        font-weight: bold;
    }

    #command-input:focus {
        border-color: #4fc1ff;
        background-color: #444;
    }

    .btn {
        padding: 15px 30px;
        font-size: 1.2rem;
        background-color: #007acc;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    #overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 30;
        text-align: center;
    }

    #overlay h1 { color: #4fc1ff; margin-bottom: 10px; font-size: 2.5rem;}
    #sub-msg { font-size: 1.2rem; margin-bottom: 30px; color: #aaa; }
</style>
</head>
<body>

<div id="app-wrapper">
    <div id="game-area"></div>
    
    <div id="bottom-console">
        <div id="ui-bar">
            <div class="stat-box">❤️ 生命: <span id="lives" style="color:#ff6b6b;">5</span></div>
            <div class="stat-box">🏆 分數: <span id="score" style="color:#4fc1ff;">0</span></div>
        </div>
        <input type="text" id="command-input" placeholder="輸入快捷鍵並按 ENTER" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" disabled>
    </div>

    <div id="overlay">
        <h1 id="msg">指令防禦戰</h1>
        <p id="sub-msg">點擊開始，請立刻準備輸入！</p>
        <button class="btn" onclick="startGame()">開始挑戰</button>
    </div>
</div>

<script>
    // 整合 Week 01 到 Week 05 所有核心指令 (包含 Week 4 筆記內容)
    const dict = {
        "直線": "L", "聚合線": "PL", "矩形": "REC", "圓形": "C",
        "偏移": "O", "修剪": "TR", "延伸": "EX", "複製": "CO", "移動": "M", "旋轉": "RO",
        "鏡射": "MI", "陣列": "AR", "填充線": "H", "分解": "X", "接合": "J",
        "建立圖塊": "B", "插入圖塊": "I", "計數": "COUNT", "快速選取": "QSE",
        "標註": "DIM", "標註型式": "D", "單行文字": "DT", "多行文字": "T",
        "尋找": "FIND", "文字型式": "STYLE", "多重引線": "MLEADER"
    };
    const words = Object.keys(dict);
    let score = 0, lives = 5, isPlaying = false, enemies = [], loop, spawner;

    function startGame() {
        score = 0; lives = 5; isPlaying = true; enemies = [];
        document.getElementById('score').innerText = 0;
        document.getElementById('lives').innerText = 5;
        document.getElementById('game-area').innerHTML = '';
        document.getElementById('overlay').style.display = 'none';
        
        const inputEl = document.getElementById('command-input');
        inputEl.disabled = false;
        inputEl.value = '';
        inputEl.focus(); // 喚出鍵盤
        
        loop = setInterval(update, 50);
        spawner = setInterval(spawn, 2000);
    }

    function spawn() {
        if(!isPlaying) return;
        const word = words[Math.floor(Math.random() * words.length)];
        const el = document.createElement('div');
        el.className = 'enemy';
        el.innerText = word;
        el.dataset.code = dict[word];
        
        const gameArea = document.getElementById('game-area');
        // 預留右側空間防止文字被切斷
        const maxLeft = gameArea.clientWidth - 100;
        el.style.left = (Math.random() * maxLeft + 10) + 'px';
        
        // 修正出生高度：往下移一點點，避免被手機上方的瀏海或系統列擋住
        el.style.top = '20px'; 
        
        gameArea.appendChild(el);
        enemies.push(el);
    }

    function update() {
        const speed = 2 + (score / 150); // 每 150 分加速一次
        const gameAreaHeight = document.getElementById('game-area').clientHeight;
        
        for(let i=enemies.length-1; i>=0; i--) {
            let top = parseFloat(enemies[i].style.top) + speed;
            enemies[i].style.top = top + 'px';
            
            // 碰到底部邊界判定
            if(top > gameAreaHeight - 40) {
                document.getElementById('game-area').removeChild(enemies[i]);
                enemies.splice(i, 1);
                lives--;
                document.getElementById('lives').innerText = lives;
                
                // 扣血畫面閃爍提示 (閃爍紅色)
                document.getElementById('game-area').style.backgroundColor = '#4a1515';
                setTimeout(() => document.getElementById('game-area').style.backgroundColor = '#252526', 150);

                if(lives <= 0) endGame();
            }
        }
    }

    document.getElementById('command-input').addEventListener('keydown', (e) => {
        if(e.key === 'Enter' && isPlaying) {
            const val = e.target.value.trim().toUpperCase();
            e.target.value = ''; // 清空輸入框
            
            for(let i=0; i<enemies.length; i++) {
                // 寬容判定設定：支援縮寫與別名
                let targetCode = enemies[i].dataset.code;
                if( targetCode === val || 
                   (val === "QSELECT" && targetCode === "QSE") ||
                   (val === "MT" && targetCode === "T") ||
                   (val === "DIMSTYLE" && targetCode === "D")) {
                    
                    score += 10;
                    document.getElementById('score').innerText = score;
                    enemies[i].style.backgroundColor = '#4CAF50';
                    enemies[i].style.borderColor = '#4CAF50';
                    const target = enemies[i];
                    enemies.splice(i, 1);
                    
                    // 擊殺動畫延遲消失
                    setTimeout(() => {
                        if(target.parentNode) document.getElementById('game-area').removeChild(target);
                    }, 100);
                    return; // 打中一個就跳出，不用繼續找
                }
            }
        }
    });

    function endGame() {
        isPlaying = false;
        clearInterval(loop); clearInterval(spawner);
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('msg').innerText = "挑戰結束！";
        document.getElementById('msg').style.color = "#ff6b6b";
        document.getElementById('sub-msg').innerText = "您的最終得分是：" + score;
        document.getElementById('command-input').disabled = true;
        document.getElementById('command-input').blur(); // 收起鍵盤
    }
</script>
</body>
</html>
