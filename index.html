<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoCAD 指令大師：鍵盤防禦戰 v2.0</title>
<style>
    body { margin: 0; background-color: #1e1e1e; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
    #game-container { position: relative; width: 95%; max-width: 600px; height: 65vh; background-color: #252526; border: 2px solid #007acc; border-radius: 10px; margin-top: 20px; overflow: hidden; }
    #ui-bar { display: flex; justify-content: space-between; padding: 10px 20px; background-color: #333; font-weight: bold; }
    .enemy { position: absolute; background-color: #d16969; color: white; padding: 8px 12px; border-radius: 5px; font-weight: bold; text-align: center; white-space: nowrap; transition: top 0.1s linear; }
    #input-area { margin-top: 15px; width: 95%; max-width: 600px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    #command-input { padding: 12px; font-size: 1.2rem; width: 100%; text-align: center; text-transform: uppercase; border: 2px solid #007acc; border-radius: 8px; background-color: #333; color: #4fc1ff; outline: none; }
    .btn { padding: 12px 24px; font-size: 1.1rem; background-color: #007acc; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; text-align: center; }
</style>
</head>
<body>

<div id="game-container">
    <div id="ui-bar">
        <span>❤️ 生命: <span id="lives">5</span></span>
        <span>🏆 分數: <span id="score">0</span></span>
    </div>
    <div id="game-area" style="position: relative; width: 100%; height: calc(100% - 45px);"></div>
    <div id="overlay">
        <h1 id="msg">指令大師防禦戰</h1>
        <p id="sub-msg">準備好左手操作快捷鍵了嗎？</p>
        <button class="btn" onclick="startGame()">開始挑戰</button>
    </div>
</div>

<div id="input-area">
    <input type="text" id="command-input" placeholder="在這裡輸入快捷鍵並按 Enter" autocomplete="off" disabled>
</div>

<script>
    const dict = {
        "接合": "J", "快速選取": "QSE", "直線": "L", "聚合線": "PL", "矩形": "REC", "圓形": "C",
        "偏移": "O", "修剪": "TR", "延伸": "EX", "複製": "CO", "移動": "M", "旋轉": "RO",
        "鏡射": "MI", "陣列": "AR", "填充線": "H", "分解": "X", "建立圖塊": "B", "插入圖塊": "I",
        "標註": "DIM", "單行文字": "DT", "多行文字": "T", "計數": "COUNT"
    };
    const words = Object.keys(dict);
    let score = 0, lives = 5, isPlaying = false, enemies = [], loop, spawner;

    function startGame() {
        score = 0; lives = 5; isPlaying = true; enemies = [];
        document.getElementById('score').innerText = 0;
        document.getElementById('lives').innerText = 5;
        document.getElementById('game-area').innerHTML = '';
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('command-input').disabled = false;
        document.getElementById('command-input').focus();
        
        loop = setInterval(update, 50);
        spawner = setInterval(spawn, 2000);
    }

    function spawn() {
        if(!isPlaying) return;
        const word = words[Math.floor(Math.random() * words.length)];
        const el = document.createElement('div');
        el.className = 'enemy';
        el.innerText = word;
        el.dataset.code = dict[word];
        el.style.left = Math.random() * (document.getElementById('game-area').clientWidth - 80) + 'px';
        el.style.top = '0px';
        document.getElementById('game-area').appendChild(el);
        enemies.push(el);
    }

    function update() {
        const speed = 2 + (score / 100);
        for(let i=enemies.length-1; i>=0; i--) {
            let top = parseFloat(enemies[i].style.top) + speed;
            enemies[i].style.top = top + 'px';
            if(top > document.getElementById('game-area').clientHeight - 30) {
                document.getElementById('game-area').removeChild(enemies[i]);
                enemies.splice(i, 1);
                lives--;
                document.getElementById('lives').innerText = lives;
                if(lives <= 0) endGame();
            }
        }
    }

    document.getElementById('command-input').addEventListener('keydown', (e) => {
        if(e.key === 'Enter' && isPlaying) {
            const val = e.target.value.trim().toUpperCase();
            e.target.value = '';
            for(let i=0; i<enemies.length; i++) {
                if(enemies[i].dataset.code === val || (val === "QSELECT" && enemies[i].dataset.code === "QSE")) {
                    score += 10;
                    document.getElementById('score').innerText = score;
                    enemies[i].style.backgroundColor = '#4CAF50';
                    const target = enemies[i];
                    enemies.splice(i, 1);
                    setTimeout(() => document.getElementById('game-area').removeChild(target), 100);
                    return;
                }
            }
        }
    });

    function endGame() {
        isPlaying = false;
        clearInterval(loop); clearInterval(spawner);
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('msg').innerText = "挑戰結束！";
        document.getElementById('sub-msg').innerText = "您的最終得分是：" + score;
        document.getElementById('command-input').disabled = true;
    }
</script>
</body>
</html>
