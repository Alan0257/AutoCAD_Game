<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoCAD 指令大師：鍵盤防禦戰</title>
<style>
    body {
        margin: 0;
        background-color: #1e1e1e;
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }
    #game-container {
        position: relative;
        width: 100%;
        max-width: 600px;
        height: 70vh;
        background-color: #252526;
        border: 2px solid #007acc;
        border-radius: 10px;
        margin-top: 20px;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0, 122, 204, 0.3);
    }
    #ui-bar {
        display: flex;
        justify-content: space-between;
        padding: 10px 20px;
        background-color: #333333;
        font-size: 1.2rem;
        font-weight: bold;
    }
    .enemy {
        position: absolute;
        background-color: #d16969;
        color: white;
        padding: 10px 15px;
        border-radius: 5px;
        font-weight: bold;
        text-align: center;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        transition: top 0.1s linear;
    }
    .enemy.destroyed {
        background-color: #4CAF50;
        transform: scale(1.2);
        opacity: 0;
        transition: all 0.2s ease;
    }
    #input-area {
        margin-top: 20px;
        display: flex;
        gap: 10px;
    }
    #command-input {
        padding: 15px;
        font-size: 1.5rem;
        width: 250px;
        text-align: center;
        text-transform: uppercase;
        border: 2px solid #007acc;
        border-radius: 8px;
        background-color: #333;
        color: #4fc1ff;
        outline: none;
    }
    #command-input:focus {
        border-color: #4fc1ff;
        box-shadow: 0 0 10px rgba(79, 193, 255, 0.5);
    }
    .btn {
        padding: 15px 30px;
        font-size: 1.2rem;
        background-color: #007acc;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }
    .btn:hover {
        background-color: #005f9e;
    }
    #overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
    }
    #overlay h1 {
        color: #d16969;
        font-size: 3rem;
        margin-bottom: 10px;
    }
    #final-score {
        font-size: 2rem;
        color: #4fc1ff;
        margin-bottom: 30px;
    }
</style>
</head>
<body>

<div id="game-container">
    <div id="ui-bar">
        <span>生命: <span id="lives">5</span> ❤️</span>
        <span>分數: <span id="score">0</span></span>
    </div>
    <div id="game-area" style="position: relative; width: 100%; height: calc(100% - 45px);"></div>
    
    <div id="overlay">
        <h1 id="overlay-title">指令大師防禦戰</h1>
        <p id="final-score" style="display: none;">最終分數: 0</p>
        <button class="btn" id="start-btn">開始挑戰</button>
    </div>
</div>

<div id="input-area">
    <input type="text" id="command-input" placeholder="輸入快捷鍵 (例: L)" autocomplete="off" disabled>
</div>

<script>
    const dictionary = {
        "直線": "L", "聚合線": "PL", "矩形": "REC", "圓形": "C",
        "偏移": "O", "修剪": "TR", "延伸": "EX", "複製": "CO",
        "移動": "M", "旋轉": "RO", "鏡射": "MI", "陣列": "AR",
        "填充線": "H", "分解": "X", "建立圖塊": "B", "插入圖塊": "I",
        "標註": "DIM", "單行文字": "DT", "多行文字": "T", "計數": "COUNT"
    };
    const keys = Object.keys(dictionary);
    
    let score = 0;
    let lives = 5;
    let gameInterval, spawnInterval;
    let enemies = [];
    let speedMultiplier = 1;
    let spawnRate = 2000;
    let isPlaying = false;

    const gameArea = document.getElementById('game-area');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const inputEl = document.getElementById('command-input');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const overlayTitle = document.getElementById('overlay-title');
    const finalScoreEl = document.getElementById('final-score');

    startBtn.addEventListener('click', startGame);

    function startGame() {
        score = 0; lives = 5; speedMultiplier = 1; spawnRate = 2000;
        scoreEl.innerText = score; livesEl.innerText = lives;
        gameArea.innerHTML = '';
        enemies = [];
        isPlaying = true;
        
        overlay.style.display = 'none';
        inputEl.disabled = false;
        inputEl.value = '';
        inputEl.focus();

        spawnEnemy();
        gameInterval = setInterval(updateGame, 50);
        spawnInterval = setInterval(spawnEnemy, spawnRate);
    }

    function spawnEnemy() {
        if(!isPlaying) return;
        const randomWord = keys[Math.floor(Math.random() * keys.length)];
        const shortcut = dictionary[randomWord];
        
        const enemy = document.createElement('div');
        enemy.classList.add('enemy');
        enemy.innerText = randomWord;
        enemy.dataset.shortcut = shortcut;
        
        // Random horizontal position
        const maxWidth = gameArea.clientWidth - 100;
        enemy.style.left = Math.floor(Math.random() * maxWidth) + 'px';
        enemy.style.top = '0px';
        
        gameArea.appendChild(enemy);
        enemies.push(enemy);

        // Increase difficulty
        if (score > 0 && score % 100 === 0) {
            speedMultiplier += 0.5;
            clearInterval(spawnInterval);
            spawnRate = Math.max(800, spawnRate - 200);
            spawnInterval = setInterval(spawnEnemy, spawnRate);
        }
    }

    function updateGame() {
        for (let i = enemies.length - 1; i >= 0; i--) {
            const enemy = enemies[i];
            let topPos = parseFloat(enemy.style.top);
            topPos += (2 * speedMultiplier);
            enemy.style.top = topPos + 'px';

            // Check if hit bottom
            if (topPos > gameArea.clientHeight - 40) {
                gameArea.removeChild(enemy);
                enemies.splice(i, 1);
                lives--;
                livesEl.innerText = lives;
                
                // Flash effect
                document.getElementById('game-container').style.borderColor = '#d16969';
                setTimeout(() => document.getElementById('game-container').style.borderColor = '#007acc', 200);

                if (lives <= 0) gameOver();
            }
        }
    }

    inputEl.addEventListener('keyup', function(e) {
        if (!isPlaying || e.key !== 'Enter') return;
        const typed = inputEl.value.trim().toUpperCase();
        inputEl.value = '';

        let hitIndex = -1;
        // Find the lowest enemy that matches the shortcut
        let maxTop = -1;
        
        for (let i = 0; i < enemies.length; i++) {
            if (enemies[i].dataset.shortcut === typed) {
                let currentTop = parseFloat(enemies[i].style.top);
                if(currentTop > maxTop) {
                    maxTop = currentTop;
                    hitIndex = i;
                }
            }
        }

        if (hitIndex !== -1) {
            const hitEnemy = enemies[hitIndex];
            hitEnemy.classList.add('destroyed');
            score += 10;
            scoreEl.innerText = score;
            
            enemies.splice(hitIndex, 1);
            setTimeout(() => {
                if(hitEnemy.parentNode) hitEnemy.parentNode.removeChild(hitEnemy);
            }, 200);
        }
    });

    function gameOver() {
        isPlaying = false;
        clearInterval(gameInterval);
        clearInterval(spawnInterval);
        inputEl.disabled = true;
        
        overlayTitle.innerText = "挑戰失敗！";
        overlayTitle.style.color = "#d16969";
        finalScoreEl.innerText = "最終分數: " + score;
        finalScoreEl.style.display = "block";
        startBtn.innerText = "重新挑戰";
        overlay.style.display = 'flex';
    }
</script>

</body>
</html>
